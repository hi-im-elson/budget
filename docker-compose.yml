services:
  duckdb-processor:
    build: .
    volumes:
      - ./data:/app/data
      - ./pipeline:/app/pipeline
      - ./scripts:/app/scripts
      - ./resources:/app/resources
    environment:
      - DUCKDB_DATABASE=/app/data/budget.db
      - TZ=America/Toronto
    command:
      - /bin/bash
      - -c
      - "/app/scripts/entrypoint.sh && tail -f /dev/null"
  api:
    build: .
    volumes:
      - ./data:/app/data
      - ./api:/app/api
      - ./pipeline:/app/pipeline
      - ./resources:/app/resources
    environment:
      - DUCKDB_DATABASE=/app/data/budget.db
      - TZ=America/Toronto
    ports:
      - "8000:8000"
    command: [ "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000" ]
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api
