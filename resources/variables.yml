db:
  db_path: "data/budget.db"

sources:
  rbc-mastercard:
    input_path: "data/raw/csv/rbc-mastercard/"
    csv_options:
      dateformat: "%Y-%m-%d"
    bronze_table: "bronze.rbc_mastercard"
    silver_table: "silver.rbc_mastercard"
    primary_key: []
    columns:
      - name: "id"
        type: "UBIGINT"
        constraints: "NOT NULL PRIMARY KEY"
      - name: "account_type"
        type: "VARCHAR(255)"
        source_column: "Account Type"
      - name: "transaction_date"
        type: "DATE"
        source_column: "Transaction Date"
      - name: "cheque_number"
        type: "VARCHAR(255)"
        source_column: "Cheque Number"
      - name: "description"
        type: "VARCHAR(255)"
        source_column: "Description 1"
      - name: "description_2"
        type: "VARCHAR(255)"
        source_column: "Description 2"
      - name: "cad"
        type: "DECIMAL(10, 2)"
        source_column: "CAD$"
      - name: "usd"
        type: "DECIMAL(10, 2)"
        source_column: "USD$"
      - name: "created_at"
        type: "TIMESTAMP"
        default: "CURRENT_TIMESTAMP"
      - name: "updated_at"
        type: "TIMESTAMP"
        default: "CURRENT_TIMESTAMP"
        on_update: "CURRENT_TIMESTAMP"
      - name: "file_name"
        type: "VARCHAR(255)"
        source_column: "filename"
  amex:
    input_path: "data/raw/csv/amex/"
    csv_options:
      dateformat: "%d %b %Y"
    bronze_table: "bronze.amex"
    silver_table: "silver.amex"
    primary_key: []
    columns:
      - name: "id"
        type: "UBIGINT"
        constraints: "NOT NULL PRIMARY KEY"
      - name: "date"
        type: "DATE"
        constraints: "NOT NULL"
        source_column: "Date"
      - name: "date_processed"
        type: "DATE"
        constraints: "NOT NULL"
        source_column: "Date Processed"
      - name: "description"
        type: "VARCHAR(255)"
        source_column: "Description"
      - name: "amount"
        type: "DECIMAL(10, 2)"
        source_column: "Amount"
      - name: "foreign_spend_amount"
        type: "VARCHAR(255)"
        source_column: "Foreign Spend Amount"
      - name: "commission"
        type: "DECIMAL(10, 2)"
        source_column: "Commission"
      - name: "exchange_rate"
        type: "DECIMAL(10, 2)"
        source_column: "Exchange Rate"
      - name: "additional_information"
        type: "VARCHAR(255)"
        source_column: "Additional Information"
      - name: "merchant"
        type: "VARCHAR(255)"
        source_column: "Merchant"
      - name: "address"
        type: "VARCHAR(255)"
        source_column: "Address"
      - name: "city_province"
        type: "VARCHAR(255)"
        source_column: "City / Province"
      - name: "postal_code"
        type: "VARCHAR(255)"
        source_column: "Postal Code"
      - name: "country"
        type: "VARCHAR(255)"
        source_column: "Country"
      - name: "reference"
        type: "VARCHAR(255)"
        source_column: "Reference"
      - name: "created_at"
        type: "TIMESTAMP"
        default: "CURRENT_TIMESTAMP"
      - name: "updated_at"
        type: "TIMESTAMP"
        default: "CURRENT_TIMESTAMP"
        on_update: "CURRENT_TIMESTAMP"
      - name: "file_name"
        type: "VARCHAR(255)"
        source_column: "filename"